packages:
  - "apps/*"
  - "packages/*"
allowBuilds:
  # onnxruntime-node is transformers.js's Node backend — never used in the webview
  # (Vite picks onnxruntime-web/WASM), so don't build its native bindings.
  onnxruntime-node: false
  protobufjs: false
  sharp: true
  tesseract.js: true
  # esbuild's postinstall installs its platform binary; pulled in by tsup (the
  # vendored editor build). A fresh CI install errors if it's not listed.
  esbuild: true
  # @parcel/watcher is @tailwindcss/cli's native file watcher — only used by
  # `--watch`, which the editor's one-shot CSS build never uses. Skip its build.
  '@parcel/watcher': false
minimumReleaseAgeExclude:
  - '@ai-sdk/gateway@4.0.2'
  - '@ai-sdk/react@4.0.2'
  - ai@7.0.2
